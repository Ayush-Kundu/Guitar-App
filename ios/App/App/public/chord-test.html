<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Detection Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        .status.recording {
            background: #cce5ff;
            color: #004085;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #startBtn {
            background: #28a745;
            color: white;
        }
        #startBtn:hover:not(:disabled) {
            background: #218838;
            transform: scale(1.05);
        }
        #stopBtn {
            background: #dc3545;
            color: white;
        }
        #stopBtn:hover:not(:disabled) {
            background: #c82333;
            transform: scale(1.05);
        }
        .chord-display {
            text-align: center;
            padding: 40px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .chord-name {
            font-size: 72px;
            font-weight: bold;
            color: #6c757d;
        }
        .chord-name.detected {
            color: #28a745;
        }
        .chord-confidence {
            font-size: 18px;
            color: #666;
            margin-top: 10px;
        }
        .chord-stability {
            font-size: 14px;
            margin-top: 5px;
        }
        .chord-stability.stable {
            color: #28a745;
        }
        .chord-stability.unstable {
            color: #ffc107;
        }
        .notes-display {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
        }
        .notes-display h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        #notesList {
            color: #666;
        }
        .log {
            margin-top: 20px;
            background: #1a1a2e;
            color: #0f0;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎸 Chord Detection Test</h1>
        
        <div class="status disconnected" id="status">Disconnected</div>
        
        <div class="controls">
            <button id="startBtn" disabled>▶ Start</button>
            <button id="stopBtn" disabled>⏹ Stop</button>
        </div>
        
        <div class="chord-display">
            <div class="chord-name" id="chordName">--</div>
            <div class="chord-confidence" id="chordConfidence"></div>
            <div class="chord-stability" id="chordStability"></div>
        </div>
        
        <div class="notes-display">
            <h3>Detected Notes</h3>
            <div id="notesList">No notes detected</div>
        </div>
        
        <div class="log" id="log"></div>
    </div>

    <script>
        // Elements
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const chordNameEl = document.getElementById('chordName');
        const chordConfidenceEl = document.getElementById('chordConfidence');
        const chordStabilityEl = document.getElementById('chordStability');
        const notesListEl = document.getElementById('notesList');
        const logEl = document.getElementById('log');

        // State
        let ws = null;
        let audioContext = null;
        let mediaStream = null;
        let scriptProcessor = null;
        let isRecording = false;

        // Config (same as main.js)
        const config = {
            instrument: 'guitar',
            sensitivity: 1.0,
            confidence_threshold: 0.5,
            silence_threshold: 0.005,
            overlap: 0.75,
            progression: true,
            multi_pitch: true,
            debug: true
        };

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML = `[${time}] ${msg}<br>` + logEl.innerHTML;
            console.log(msg);
        }

        function updateStatus(status, className) {
            statusEl.textContent = status;
            statusEl.className = 'status ' + className;
        }

        // Connect to WebSocket
        function connect() {
            log('Connecting to ws://localhost:9103/ws...');
            
            ws = new WebSocket('ws://localhost:9103/ws');
            
            ws.onopen = () => {
                log('WebSocket connected, sending config...');
                ws.send(JSON.stringify(config));
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch (e) {
                    log('Error parsing message: ' + e);
                }
            };
            
            ws.onerror = (error) => {
                log('WebSocket error!');
                updateStatus('Connection Error', 'disconnected');
            };
            
            ws.onclose = () => {
                log('WebSocket closed');
                updateStatus('Disconnected', 'disconnected');
                startBtn.disabled = true;
                stopBtn.disabled = true;
            };
        }

        function handleMessage(data) {
            log('Received: ' + data.type);
            
            if (data.type === 'connected') {
                log('Server confirmed connection');
                updateStatus('Connected', 'connected');
                startBtn.disabled = false;
                return;
            }
            
            if (data.type === 'chord') {
                chordNameEl.textContent = data.chord || '--';
                chordNameEl.className = data.chord ? 'chord-name detected' : 'chord-name';
                
                if (data.confidence !== undefined) {
                    chordConfidenceEl.textContent = `Confidence: ${(data.confidence * 100).toFixed(1)}%`;
                }
                
                if (data.stability !== undefined) {
                    chordStabilityEl.textContent = data.stability >= 2 ? 'Stable' : 'Unstable';
                    chordStabilityEl.className = 'chord-stability ' + (data.stability >= 2 ? 'stable' : 'unstable');
                }
                
                if (data.notes && data.notes.length > 0) {
                    const noteStr = data.notes.map(n => Array.isArray(n) ? n[0] : n).join(' · ');
                    notesListEl.textContent = noteStr;
                }
                
                log(`Chord: ${data.chord} (${(data.confidence * 100).toFixed(1)}%)`);
            }
            
            if (data.type === 'notes' && data.notes) {
                const noteStr = data.notes.map(n => Array.isArray(n) ? n[0] : n).join(' · ');
                notesListEl.textContent = noteStr || 'No notes detected';
            }
        }

        // Start recording
        async function startRecording() {
            log('Starting recording...');
            
            try {
                // Get microphone
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 44100
                    }
                });
                log('Got microphone access');
                
                // Create audio context
                audioContext = new AudioContext({ sampleRate: 44100 });
                log(`AudioContext created, sample rate: ${audioContext.sampleRate}`);
                
                const source = audioContext.createMediaStreamSource(mediaStream);
                scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                
                let chunkCount = 0;
                scriptProcessor.onaudioprocess = (event) => {
                    if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
                    
                    const inputData = event.inputBuffer.getChannelData(0);
                    chunkCount++;
                    
                    if (chunkCount <= 3) {
                        const rms = Math.sqrt(inputData.reduce((sum, val) => sum + val * val, 0) / inputData.length);
                        log(`Audio chunk #${chunkCount}: ${inputData.length} samples, RMS: ${rms.toFixed(4)}`);
                    }
                    
                    // Send as binary (Float32Array buffer) - CRITICAL!
                    try {
                        ws.send(inputData.buffer);
                    } catch (e) {
                        log('Error sending audio: ' + e);
                    }
                };
                
                source.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination);
                
                isRecording = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                updateStatus('Recording...', 'recording');
                log('Recording started!');
                
            } catch (error) {
                log('Error: ' + error.message);
                updateStatus('Error: ' + error.message, 'disconnected');
            }
        }

        // Stop recording
        function stopRecording() {
            log('Stopping recording...');
            isRecording = false;
            
            if (scriptProcessor) {
                scriptProcessor.disconnect();
                scriptProcessor = null;
            }
            
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            updateStatus('Connected', 'connected');
            log('Recording stopped');
        }

        // Event listeners
        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);

        // Connect on load
        window.addEventListener('load', () => {
            log('Page loaded, connecting...');
            connect();
        });
    </script>
</body>
</html>
